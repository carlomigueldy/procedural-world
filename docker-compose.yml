services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: procedural
      DB_PASSWORD: procedural
      DB_NAME: procedural_world
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: procedural
      POSTGRES_PASSWORD: procedural
      POSTGRES_DB: procedural_world
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U procedural"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
